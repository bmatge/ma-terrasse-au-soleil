<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Au Soleil - Maintenance en cours</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 50%, #fbbf24 100%);
      color: #78350f;
      padding: 1.5rem;
    }
    .card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 1.5rem;
      padding: 3rem 2.5rem;
      max-width: 480px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(120, 53, 15, 0.15);
    }
    .sun {
      font-size: 4rem;
      margin-bottom: 1rem;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
      color: #92400e;
    }
    p {
      font-size: 1.05rem;
      line-height: 1.6;
      color: #a16207;
      margin-bottom: 0.5rem;
    }
    .hint {
      font-size: 0.85rem;
      color: #b45309;
      margin-top: 1.5rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="sun">&#9728;&#65039;</div>
    <h1>Maintenance en cours</h1>
    <p>On installe les parasols et on revient dans quelques instants !</p>
    <p class="hint">Rafraîchissez la page dans 1-2 minutes.</p>
  </div>
</body>
</html>
