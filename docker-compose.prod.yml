# Production — usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  backend:
    restart: always
    environment:
      LOG_LEVEL: warning
      GOOGLE_STREETVIEW_KEY: ${GOOGLE_STREETVIEW_KEY}
      GOOGLE_PLACES_KEY: ${GOOGLE_PLACES_KEY}
      SMTP_HOST: mailserver
      SMTP_PORT: 25
      SMTP_FROM: noreply@ecosysteme.matge.com
      REDIS_URL: redis://ma-terrasse-au-soleil-redis-1:6379/0
    networks:
      - default
      - ecosystem-network
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    restart: always
    networks:
      - default
      - ecosystem-network
    labels:
      - "traefik.enable=true"
      # Domaine principal (priority 100 > maintenance priority 1)
      - "traefik.http.routers.terrasses.rule=Host(`ausoleil.app`)"
      - "traefik.http.routers.terrasses.entrypoints=websecure"
      - "traefik.http.routers.terrasses.tls.certresolver=letsencrypt"
      - "traefik.http.routers.terrasses.priority=100"
      - "traefik.http.services.terrasses.loadbalancer.server.port=80"
      # Redirect ancien domaine → ausoleil.app
      - "traefik.http.routers.terrasses-old.rule=Host(`terrasses.paris.matge.com`)"
      - "traefik.http.routers.terrasses-old.entrypoints=websecure"
      - "traefik.http.routers.terrasses-old.tls.certresolver=letsencrypt"
      - "traefik.http.routers.terrasses-old.middlewares=redirect-to-ausoleil"
      - "traefik.http.routers.terrasses-old.service=terrasses"
      - "traefik.http.middlewares.redirect-to-ausoleil.redirectregex.regex=^https://terrasses\\.paris\\.matge\\.com(.*)"
      - "traefik.http.middlewares.redirect-to-ausoleil.redirectregex.replacement=https://ausoleil.app$${1}"
      - "traefik.http.middlewares.redirect-to-ausoleil.redirectregex.permanent=true"
      # matge.com (AdSense)
      - "traefik.http.routers.matge.rule=Host(`matge.com`)"
      - "traefik.http.routers.matge.entrypoints=websecure"
      - "traefik.http.routers.matge.tls.certresolver=letsencrypt"
      - "traefik.http.routers.matge.priority=100"
      - "traefik.http.routers.matge.service=terrasses"

  cron:
    build:
      context: ./backend
      target: production
    restart: always
    entrypoint: ["sh", "/app/scripts/cron_scheduler.sh"]
    environment:
      DATABASE_URL_SYNC: postgresql://terrasse:${DB_PASSWORD:-devpassword}@db:5432/terrasse_soleil
      CRON_HOUR: "3"
      TZ: Europe/Paris
    volumes:
      - ./data:/app/data
      - ./scripts:/app/scripts
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  maintenance:
    image: nginx:alpine
    restart: always
    volumes:
      - ./infra/maintenance/index.html:/usr/share/nginx/html/index.html:ro
      - ./infra/maintenance/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ecosystem-network
    labels:
      - "traefik.enable=true"
      # Fallback routers — same domains, lower priority (1 < 100)
      # When frontend is down, Traefik falls back to these
      - "traefik.http.routers.maintenance.rule=Host(`ausoleil.app`)"
      - "traefik.http.routers.maintenance.entrypoints=websecure"
      - "traefik.http.routers.maintenance.tls.certresolver=letsencrypt"
      - "traefik.http.routers.maintenance.priority=1"
      - "traefik.http.routers.maintenance-matge.rule=Host(`matge.com`)"
      - "traefik.http.routers.maintenance-matge.entrypoints=websecure"
      - "traefik.http.routers.maintenance-matge.tls.certresolver=letsencrypt"
      - "traefik.http.routers.maintenance-matge.priority=1"
      - "traefik.http.services.maintenance.loadbalancer.server.port=80"
    deploy:
      resources:
        limits:
          memory: 16M

  umami:
    image: umamisoftware/umami:postgresql-latest
    restart: always
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD}@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_SECRET}
    networks:
      - default
      - ecosystem-network
    depends_on:
      - umami-db
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.umami.rule=Host(`stats.ausoleil.app`)"
      - "traefik.http.routers.umami.entrypoints=websecure"
      - "traefik.http.routers.umami.tls.certresolver=letsencrypt"
      - "traefik.http.services.umami.loadbalancer.server.port=3000"

  umami-db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD}
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M

  db:
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  ecosystem-network:
    external: true

volumes:
  umami-db-data:
