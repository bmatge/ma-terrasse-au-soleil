proxy_cache_path /tmp/tile-cache levels=1:2 keys_zone=tiles:10m max_size=500m inactive=7d;

map $http_user_agent $is_bot {
    default 0;
    ~*(facebookexternalhit|Twitterbot|WhatsApp|LinkedInBot|Slackbot|TelegramBot|Googlebot|Discordbot|Applebot|bingbot|Pinterestbot|Snapchat) 1;
}

server {
    listen 80;

    location ~* \.mp3$ {
        root /usr/share/nginx/html;
        add_header Content-Type audio/mpeg;
    }

    # Pour les bots sociaux, servir les OG tags depuis le backend
    location ~ ^/terrasse/(\d+)$ {
        if ($is_bot) {
            rewrite ^/terrasse/(\d+)$ /api/og/terrasse/$1 last;
        }
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    # Static SEO files — serve directly with correct content types
    location = /robots.txt {
        root /usr/share/nginx/html;
        add_header Content-Type text/plain;
    }

    location = /ads.txt {
        root /usr/share/nginx/html;
        add_header Content-Type text/plain;
    }

    # Proxy sitemap.xml to backend for dynamic generation
    location = /sitemap.xml {
        proxy_pass http://backend:8000/api/sitemap.xml;
        proxy_set_header Host $host;
        proxy_cache tiles;
        proxy_cache_valid 200 1h;
        add_header Content-Type application/xml;
    }

    # Service worker — never cache
    location /sw.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Reverse proxy for OpenFreeMap tiles (avoids CSP issues)
    location /tiles/ {
        proxy_pass https://tiles.openfreemap.org/;
        proxy_set_header Host tiles.openfreemap.org;
        proxy_set_header Accept-Encoding "";
        proxy_ssl_server_name on;

        # Cache tiles locally (saves bandwidth, faster loads)
        proxy_cache tiles;
        proxy_cache_valid 200 7d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;

        # Allow CORS for map resources
        add_header Access-Control-Allow-Origin *;
    }
}
